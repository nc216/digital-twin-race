<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Twin Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #chat-container {
      width: 100%; height: 100vh;
      background: #fff;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #chat-header { display: none; }
    #chat-messages {
      flex: 1; overflow-y: auto; padding: 20px 16px 10px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .msg {
      max-width: 80%; padding: 8px 12px; border-radius: 10px;
      font-size: 18px; line-height: 1.45; word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end; background: #4a90d9; color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start; background: #ebebeb; color: #333;
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center; background: #fff3cd; color: #856404;
      font-size: 14px; border-radius: 8px;
    }
    #typing {
      align-self: flex-start; color: #999; font-size: 15px;
      font-style: italic; padding: 4px 12px; display: none;
    }
    #input-area {
      display: flex; border-top: none;
      padding: 12px 16px; gap: 10px; align-items: center;
    }
    #user-input {
      flex: 1; border: none; border-radius: 6px;
      background: #ebebeb; color: #333;
      padding: 10px 14px; font-size: 18px; outline: none;
      font-family: inherit; height: 42px;
    }
    #user-input::placeholder { color: #999; }
    #user-input:disabled { opacity: 0.6; }
    #send-btn {
      background: #6abf69; color: #fff; border: none;
      border-radius: 6px; padding: 0 18px; font-size: 16px;
      cursor: pointer; font-weight: 600; height: 42px;
    }
    #send-btn:hover { background: #57a857; }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
    #status { display: none; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">Conversation</div>
    <div id="chat-messages">
      <div id="typing">Typing...</div>
    </div>
    <div id="input-area">
      <input id="user-input" type="text" placeholder="Type here" autocomplete="off" disabled />
      <button id="send-btn" disabled>Send</button>
    </div>
    <div id="status">Loading...</div>
  </div>

<script>
/*
  URL params:
    condition = "twin" | "twin_white" | "gpt" | "control"
      twin       → chat with a real Black twin from Twin-2K-500
      twin_white → chat with a real White twin from Twin-2K-500
      gpt        → chat with ChatGPT prompted as a Black American (minimal prompt)
      control    → neutral chat (about pets, hobbies, etc.)
    pid          → (optional) specific persona ID for the twin condition
*/

const PROXY_URL = "https://script.google.com/macros/s/AKfycbxUCOU5JqXGabGyKN7lcv7YuKj_8B-Jjt_0n3Lq8pEtwljYvzDKXOaC86lbcSYJW7fI/exec";

let systemPrompt = null;
let personaId = null;
let personaTwstScore = null;
let personaGreenScore = null;
let condition = null;
let history = [];
let turnCount = 0;
let finished = false;

const messagesEl = document.getElementById("chat-messages");
const inputEl = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const typingEl = document.getElementById("typing");
const statusEl = document.getElementById("status");
const headerEl = document.getElementById("chat-header");

function param(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  messagesEl.insertBefore(div, typingEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setEnabled(on) {
  inputEl.disabled = !on;
  sendBtn.disabled = !on;
}

function sendMetadata() {
  window.parent.postMessage({
    type: "chatbot_transcript",
    session_id: (personaId || condition) + "_" + Date.now(),
    persona_id: personaId,
    condition: condition,
    transcript: "",
    turn_count: 0,
    twst_score: personaTwstScore,
    green_score: personaGreenScore
  }, "*");
}

async function initTwin() {
  const res = await fetch("personas_black_full.json");
  const personasArr = await res.json();

  const pidParam = param("pid");
  let entry;
  if (pidParam) {
    entry = personasArr.find(p => String(p.pid) === String(pidParam));
  }
  if (!entry) {
    entry = personasArr[Math.floor(Math.random() * personasArr.length)];
  }

  personaId = entry.pid;
  personaTwstScore = entry.twst_score;
  personaGreenScore = entry.green_score;

  systemPrompt =
    "You are roleplaying as a specific person. You must stay in character at all times and respond as this person would, based on their profile below. Do not break character. Do not reveal that you are an AI. Respond naturally and conversationally.\n\nAge ranges in the profile are survey buckets — pick and consistently use a specific realistic age within the range (e.g. '65+' becomes 72, '30-49' becomes 38).\n\n--- PERSONA PROFILE ---\n" +
    entry.persona +
    "\n--- END PERSONA PROFILE ---";
}

async function initTwinWhite() {
  const res = await fetch("personas_white_full.json");
  const personasArr = await res.json();

  const pidParam = param("pid");
  let entry;
  if (pidParam) {
    entry = personasArr.find(p => String(p.pid) === String(pidParam));
  }
  if (!entry) {
    entry = personasArr[Math.floor(Math.random() * personasArr.length)];
  }

  personaId = "white_" + entry.pid;
  personaTwstScore = entry.twst_score;
  personaGreenScore = entry.green_score;

  systemPrompt =
    "You are roleplaying as a specific person. You must stay in character at all times and respond as this person would, based on their profile below. Do not break character. Do not reveal that you are an AI. Respond naturally and conversationally.\n\nAge ranges in the profile are survey buckets — pick and consistently use a specific realistic age within the range (e.g. '65+' becomes 72, '30-49' becomes 38).\n\n--- PERSONA PROFILE ---\n" +
    entry.persona +
    "\n--- END PERSONA PROFILE ---";
}

function initGpt() {
  personaId = "gpt_black";
  personaTwstScore = null;
  personaGreenScore = null;

  systemPrompt =
    "You are a Black American. Have a natural conversation. If asked about yourself, share details about your life, preferences, and habits as they come up naturally. Do not volunteer your race unless asked directly. Do not reveal that you are an AI. Respond naturally and conversationally.";
}

function initControl() {
  personaId = "control";
  personaTwstScore = null;
  personaGreenScore = null;

  systemPrompt =
    "You are a friendly conversationalist. Have a casual, natural conversation about everyday topics like pets, hobbies, travel, food, sports, movies, or music. Keep the conversation light and engaging. Do not discuss politics, race, income, shopping habits, or spending. Do not reveal that you are an AI. Respond naturally and conversationally.";
}

async function init() {
  condition = (param("condition") || "twin").toLowerCase();

  try {
    if (condition === "twin") {
      await initTwin();
    } else if (condition === "twin_white") {
      await initTwinWhite();
    } else if (condition === "gpt") {
      initGpt();
    } else if (condition === "control") {
      initControl();
    } else {
      addMsg("system", "Unknown condition: " + condition);
      return;
    }

    sendMetadata();

    addMsg("assistant", "Hi! Feel free to ask me anything.");
    setEnabled(true);
    inputEl.focus();

    setTimeout(function() { if (!finished) endChat(); }, 10 * 60 * 1000);
  } catch (err) {
    addMsg("system", "Error: " + err.message);
  }
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || !systemPrompt || finished) return;

  addMsg("user", text);
  inputEl.value = "";
  setEnabled(false);
  typingEl.style.display = "block";

  try {
    const res = await fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        system: systemPrompt,
        history: history,
        message: text
      })
    });
    const data = await res.json();
    typingEl.style.display = "none";

    if (data.error) throw new Error(data.error);

    const reply = data.output_text || "(no response)";
    addMsg("assistant", reply);

    history.push({ role: "user", content: text });
    history.push({ role: "assistant", content: reply });
    turnCount++;
    setEnabled(true);
    inputEl.focus();
  } catch (err) {
    typingEl.style.display = "none";
    addMsg("system", "Error: " + err.message);
    setEnabled(true);
  }
}

function endChat() {
  finished = true;
  setEnabled(false);
  addMsg("system", "Conversation complete. Thank you!");

  try {
    window.parent.postMessage({
      type: "chatbot_transcript",
      session_id: (personaId || condition) + "_" + Date.now(),
      persona_id: personaId,
      condition: condition,
      transcript: JSON.stringify(history),
      turn_count: turnCount,
      twst_score: personaTwstScore,
      green_score: personaGreenScore
    }, "*");
  } catch (_) {}
}

sendBtn.addEventListener("click", sendMessage);
inputEl.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

init();
</script>
</body>
</html>
